substitutions:
  # device_name: "Steba Humidifier"
  name: "somfy"
  friendly_name: "Somfy"
  room: "Terrasse"
  project_name: ""
  project_version: "2026.01.0"
  device_description: "Control Somfy covers with the ESP32-C6 Supermini"

  c1_name: "Dach" # "Крыша"
  c2_name: "Seite" # "Бок"
  c3_name: "Links" # "Левая"
  c4_name: "Rechts" # "Правая"
  c5_name: "Terrasse" # "Терасса"

  # Webserver credentials
  web_username: !secret web_server_user
  web_password: !secret web_server_password

  # GPIO пины для управления (кнопки)
  up_gpio: GPIO4
  down_gpio: GPIO5
  my_gpio: GPIO6
  select_gpio: GPIO7

  # GPIO пины для считывания состояния
  l1_gpio: GPIO0 # cover 1
  l2_gpio: GPIO1 # cover 2
  l3_gpio: GPIO2 # cover 3
  l4_gpio: GPIO3 # cover 4

  # GPIO пины светодиодов
  rgb_led_gpio: GPIO8
  system_led_gpio: GPIO15

globals:
  - id: retry_count
    type: int
    restore_value: no
    initial_value: '0'

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  comment: "${device_description}"

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret somfy

ota:
  - platform: esphome
    id: my_ota
    password: !secret ota_password # "0a2a51f485cc9ee08a96402b33b1470e"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${name}"
    password: !secret fallback_ap_password

captive_portal:

web_server:
  id: esphome_web_server
  version: 3
  port: 80
  auth:
    username: "${web_username}"
    password: "${web_password}"

# Трекер для Bluetooth
esp32_ble_tracker:
  scan_parameters:
    active: true

# Включаем сам прокси
bluetooth_proxy:
  active: true

# Бинарные сенсоры для считывания светодиодов
binary_sensor:
  - platform: gpio
    id: led_1
    pin: 
      number: '${l1_gpio}'
      mode: INPUT_PULLDOWN
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_state:
      then:
        - script.execute: update_status_ui
  - platform: gpio
    id: led_2
    pin: 
      number: '${l2_gpio}'
      mode: INPUT_PULLDOWN
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_state:
      then:
        - script.execute: update_status_ui
  - platform: gpio
    id: led_3
    pin: 
      number: '${l3_gpio}'
      mode: INPUT_PULLDOWN
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_state:
      then:
        - script.execute: update_status_ui
  - platform: gpio
    id: led_4
    pin: 
      number: '${l4_gpio}'
      mode: INPUT_PULLDOWN
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_state:
      then:
        - script.execute: update_status_ui

output:
  - platform: gpio
    pin: '${up_gpio}'
    id: up_output
  - platform: gpio
    pin: '${down_gpio}'
    id: down_output
  - platform: gpio
    pin: '${my_gpio}'
    id: my_output
  - platform: gpio
    pin: '${select_gpio}'
    id: select_output

button:
    # Restart the ESP
  - platform: restart
    name: "Restart"

  - platform: template
    name: "Somfy: Сброс статуса"
    id: btn_reset_status
    icon: "mdi:refresh"
    on_press:
      - lambda: |-
          id(retry_count) = 0;
          auto call = id(rgb_led).turn_on();
          call.set_effect("none");
          call.set_rgb(0.1, 0, 0.1); // Возвращаем цвет "сна"
          call.perform();
          id(active_channel_text).publish_state("Готов");

  - platform: output
    name: "Hoch"
    id: btn_up
    output: up_output
    internal: True
    duration: 0.4s

  - platform: output
    name: "Runter"
    id: btn_down
    output: down_output
    internal: True
    duration: 0.4s

  - platform: output
    name: "My-Stop"
    id: btn_stop
    output: my_output
    internal: True
    duration: 0.4s

  - platform: output
    name: "Auswahl"
    id: btn_select
    output: select_output
    # internal: True
    duration: 0.4s

# Скрипт выбора канала
script:
  - id: execute_somfy_command
    parameters:
      target: int
      action: int
    mode: restart
    then:
      - lambda: 'id(retry_count) = 0;'
      - light.turn_on: system_led
      
      # Запускаем эффект пульсации сразу
      - light.turn_on:
          id: rgb_led
          effect: "Channel Pulse"

      # Проверка на сон: если всё выключено, будим пульт первым нажатием
      - if:
          condition:
            lambda: 'return ((id(led_4).state << 3) | (id(led_3).state << 2) | (id(led_2).state << 1) | id(led_1).state) == 0;'
          then:
            - button.press: btn_select
            - delay: 0.5s # Ждем, пока пульт "очухается"

      # 2. Основной цикл выбора канала
      - while:
          condition:
            lambda: |-
              int current = (id(led_4).state << 3) | (id(led_3).state << 2) | (id(led_2).state << 1) | id(led_1).state;
              int desired = (target == 5) ? 0b1111 : (1 << (target - 1));
              return (current != desired && id(retry_count) < 15);
          then:
            - button.press: btn_select
            - lambda: 'id(retry_count) += 1;'
            - delay: 0.7s # Оптимизированная задержка

      # Финальное нажатие (Вверх/Вниз/Стоп)
      - lambda: |-
          int current = (id(led_4).state << 3) | (id(led_3).state << 2) | (id(led_2).state << 1) | id(led_1).state;
          int desired = (target == 5) ? 0b1111 : (1 << (target - 1));
          
          if (current == desired) {
            if (action == 1) id(btn_up).press();
            else if (action == 2) id(btn_down).press();
            else if (action == 3) id(btn_stop).press();
            id(system_led).turn_off().perform();
          } else {
            id(active_channel_text).publish_state("Ошибка");
            // При ошибке включаем красный мигающий свет без эффекта
            auto call = id(rgb_led).turn_on();
            call.set_rgb(1.0, 0.0, 0.0);
            call.set_effect("Error Flash");
            call.perform();
          }

  - id: update_status_ui
    mode: restart # Важно: перезапуск сбрасывает таймер 30 секунд
    then:
      # Устанавливаем цвет RGB в зависимости от ТЕКУЩЕГО (промежуточного) канала
      - lambda: |-
          // 1. Рассчитываем текущий канал
          int current = (id(led_4).state << 3) | (id(led_3).state << 2) | (id(led_2).state << 1) | id(led_1).state;
          auto call = id(rgb_led).turn_on();
          
          // 2. Устанавливаем цвет HA Hex
          switch (current) {
            case 0b0001: call.set_rgb(0.01, 0.66, 0.95); break; // HA Blue
            case 0b0010: call.set_rgb(0.30, 0.68, 0.31); break; // HA Green
            case 0b0100: call.set_rgb(1.00, 0.60, 0.00); break; // HA Orange
            case 0b1000: call.set_rgb(0.60, 0.40, 0.80); break; // Purple
            case 0b1111: call.set_rgb(1.00, 0.80, 0.00); break; // HA Yellow
            case 0b0000: call.set_rgb(0.50, 0.50, 0.50); break; // White (Sleep)
            default:     call.set_rgb(1.00, 1.00, 1.00); break;
          }
          call.set_effect("Channel Pulse");
          call.perform();
          
          // 3. Обновляем текстовый сенсор принудительно
          id(active_channel_text).update();

      - delay: 30s
      - light.turn_off: rgb_led
      - lambda: 'id(active_channel_text).publish_state("Сон (Эко)");'

cover:
  # Маркиза 1 (Dach)
  - platform: time_based
    name: "${c1_name}"
    device_class: awning
    icon: "mdi:storefront"
    id: cover_1
    has_built_in_endstop: True
    open_action:
      - script.execute: { id: execute_somfy_command, target: 1, action: 1 }
    open_duration: 50s
    close_action:
      - script.execute: { id: execute_somfy_command, target: 1, action: 2 }
    close_duration: 50s
    stop_action:
      - script.execute: { id: execute_somfy_command, target: 1, action: 3 }

  # Маркиза 2 (Seite)
  - platform: time_based
    name: "${c2_name}"
    device_class: awning
    icon: "mdi:window-shutter"
    id: cover_2
    has_built_in_endstop: True
    open_action:
      - script.execute: { id: execute_somfy_command, target: 2, action: 1 }
    open_duration: 28s
    close_action:
      - script.execute: { id: execute_somfy_command, target: 2, action: 2 }
    close_duration: 26s
    stop_action:
      - script.execute: { id: execute_somfy_command, target: 2, action: 3 }

  # Маркиза 3 (Links)
  - platform: time_based
    name: "${c3_name}"
    device_class: awning
    icon: "mdi:window-shutter"
    id: cover_3
    has_built_in_endstop: True
    open_action:
      - script.execute: { id: execute_somfy_command, target: 3, action: 1 }
    open_duration: 28s
    close_action:
      - script.execute: { id: execute_somfy_command, target: 3, action: 2 }
    close_duration: 26s
    stop_action:
      - script.execute: { id: execute_somfy_command, target: 3, action: 3 }

  # Маркиза 4 (Rechts)
  - platform: time_based
    name: "${c4_name}"
    device_class: awning
    icon: "mdi:window-shutter"
    id: cover_4
    has_built_in_endstop: True
    open_action:
      - script.execute: { id: execute_somfy_command, target: 4, action: 1 }
    open_duration: 28s
    close_action:
      - script.execute: { id: execute_somfy_command, target: 4, action: 2 }
    close_duration: 26s
    stop_action:
      - script.execute: { id: execute_somfy_command, target: 4, action: 3 }

  # Группа Все (Alle) - Канал 5
  - platform: time_based
    name: "${c5_name}"
    device_class: awning
    icon: "mdi:group"
    id: cover_all
    has_built_in_endstop: True
    open_action:
      - script.execute: { id: execute_somfy_command, target: 5, action: 1 }
    open_duration: 50s
    close_action:
      - script.execute: { id: execute_somfy_command, target: 5, action: 2 }
    close_duration: 50s
    stop_action:
      - script.execute: { id: execute_somfy_command, target: 5, action: 3 }

# Настройка RGB светодиода (обычно это WS2812 на C6 Super Mini)
light:
  - platform: esp32_rmt_led_strip
    id: rgb_led
    pin: '${rgb_led_gpio}'
    num_leds: 1
    chipset: ws2812
    rgb_order: GRB
    name: "Статус"
    restore_mode: ALWAYS_OFF
    effects:
      - pulse:
          name: "Error Flash"
          transition_length: 100ms
          update_interval: 500ms
      - addressable_lambda:
          name: "Channel Pulse"
          update_interval: 20ms
          lambda: |-
            // Создаем плавную пульсацию яркости от 30% до 100%
            float progress = sinf(millis() * 0.003f); 
            float multiplier = remap(progress, -1.0f, 1.0f, 0.3f, 1.0f);
            
            // Мы НЕ объявляем current_color, она уже есть в контексте.
            // Просто используем её значения для расчета новой яркости.
            it[0] = Color(
              uint8_t(current_color.r * multiplier),
              uint8_t(current_color.g * multiplier),
              uint8_t(current_color.b * multiplier)
            );

  # Обычный синий LED на плате
  - platform: status_led
    id: system_led
    pin: '${system_led_gpio}'

text_sensor:
  - platform: template
    name: "Статус пульта Somfy"
    id: active_channel_text
    icon: "mdi:remote-tv"
    lambda: |-
      if (id(retry_count) >= 10) return {"Ошибка"};
      
      int state = (id(led_4).state << 3) | (id(led_3).state << 2) | (id(led_2).state << 1) | id(led_1).state;
      
      switch (state) {
        case 0b0001: return {"1. Dach (Крыша)"};
        case 0b0010: return {"2. Seite (Бок)"};
        case 0b0100: return {"3. Links (Лево)"};
        case 0b1000: return {"4. Rechts (Право)"};
        case 0b1111: return {"5. Alle (Все)"};
        case 0:      return {"Eco (Сон)"};
        default:     return {"Auswahl (Переход...)"};
      }
