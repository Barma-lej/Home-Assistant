substitutions:
  # device_name: "BT Proxy 691C"
  name: "bt-proxy-691c"
  friendly_name: "BT Proxy 691C"
  room: "Arbeitszimmer"
  project_name: ""
  project_version: "2026.06.0"
  device_description: "Bluetooth proxy based on the ESP32-C6 Supermini"

  # Webserver credentials
  web_username: !secret web_server_user
  web_password: !secret web_server_password

  # GPIO пины светодиодов
  rgb_led_gpio: GPIO8
  system_led_gpio: GPIO15

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  comment: "${device_description}"

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret somfy

ota:
  - platform: esphome
    id: my_ota
    password: !secret ota_password # "0a2a51f485cc9ee08a96402b33b1470e"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${name}"
    password: !secret fallback_ap_password

captive_portal:

web_server:
  id: esphome_web_server
  version: 3
  port: 80
  auth:
    username: "${web_username}"
    password: "${web_password}"

# Трекер для Bluetooth
esp32_ble_tracker:
  scan_parameters:
    active: true

# Включаем сам прокси
bluetooth_proxy:
  active: true

button:
    # Restart the ESP
  - platform: restart
    name: "Restart"

# Настройка RGB светодиода (обычно это WS2812 на C6 Super Mini)
light:
  - platform: esp32_rmt_led_strip
    id: rgb_led
    pin: '${rgb_led_gpio}'
    num_leds: 1
    chipset: ws2812
    rgb_order: GRB
    name: "Статус"
    restore_mode: ALWAYS_OFF
    effects:
      - pulse:
          name: "Error Flash"
          transition_length: 100ms
          update_interval: 500ms
      - addressable_lambda:
          name: "Channel Pulse"
          update_interval: 20ms
          lambda: |-
            // Создаем плавную пульсацию яркости от 30% до 100%
            float progress = sinf(millis() * 0.003f); 
            float multiplier = remap(progress, -1.0f, 1.0f, 0.3f, 1.0f);
            
            // Мы НЕ объявляем current_color, она уже есть в контексте.
            // Просто используем её значения для расчета новой яркости.
            it[0] = Color(
              uint8_t(current_color.r * multiplier),
              uint8_t(current_color.g * multiplier),
              uint8_t(current_color.b * multiplier)
            );

  # Обычный синий LED на плате
  - platform: status_led
    id: system_led
    pin: '${system_led_gpio}'

