# ============================================================================
# Irrigation 05 — Dashboard (Lovelace)  ·  Version 2.1
# ----------------------------------------------------------------------------
# * Recorder-/Logbook-Ausschlüsse für die View-Umschalter
# * Skript zum Umschalten der Tabs (Conditional Cards)
# * Moderner Dashboard-Vorschlag inkl. der neuen Bereiche
#   (Wetter, Wochentage, adaptive Dauer, Benachrichtigungen)
# ============================================================================

# ---------------------------------------------------------------------------
# Recorder / Logbook — UI-Helfer nicht aufzeichnen
# ---------------------------------------------------------------------------
recorder:
  exclude:
    entities:
      - script.irrigation_views_toggle
      - input_boolean.irrigation_view_cycle1
      - input_boolean.irrigation_view_cycle2
      - input_boolean.irrigation_view_stat
      - input_boolean.irrigation_view_consumption

logbook:
  exclude:
    entities:
      - script.irrigation_views_toggle
      - input_boolean.irrigation_view_cycle1
      - input_boolean.irrigation_view_cycle2
      - input_boolean.irrigation_view_stat
      - input_boolean.irrigation_view_consumption

# ============================================================================
# Irrigation 06 — UI-Helfer für das Lovelace-Dashboard  ·  Version 2.1
# ----------------------------------------------------------------------------
# Diese Helfer werden vom bestehenden Dashboard (Dashboard.yml) benötigt:
#   * "_view"-Booleans steuern das Aufklappen von Detail-Kacheln
#     (Tap auf "Zeitplan"/"Wetterbedingungen" blendet Details ein/aus).
#   * irrigation_view_settings ist der Umschalter für die NEUE Registerkarte
#     "Einstellungen" mit allen Erweiterungen aus 2.1 (Wetter, Wochentage,
#     adaptive Dauer, Benachrichtigungen, Zonensensoren).
#
# Das vorhandene Skript script.irrigation_views_toggle schaltet automatisch
# alle input_boolean.irrigation_view_* gegeneinander um — die neue Registerkarte
# funktioniert daher ohne weitere Anpassung des Skripts.
# ============================================================================

input_boolean:
  # # Detail-Einblendung für den Morgen-Zeitplan
  # irrigation_cycle1_enable_view:
  #   name: Irrigation - Morgen Zeitplan Details
  #   icon: mdi:calendar-expand-horizontal
  # irrigation_cycle1_use_sensor_data_view:
  #   name: Irrigation - Morgen Wetterbedingungen Details
  #   icon: mdi:thermometer-lines

  # # Detail-Einblendung für den Abend-Zeitplan
  # irrigation_cycle2_enable_view:
  #   name: Irrigation - Abend Zeitplan Details
  #   icon: mdi:calendar-expand
  # irrigation_cycle2_use_sensor_data_view:
  #   name: Irrigation - Abend Wetterbedingungen Details
  #   icon: mdi:thermometer-lines

  # NEUE Registerkarte "Einstellungen" (2.1-Erweiterungen)
  irrigation_view_settings:
    name: Irrigation - Einstellungen
    icon: mdi:cog

# ---------------------------------------------------------------------------
# Tab-Umschalter
# ---------------------------------------------------------------------------
script:
  irrigation_views_toggle:
    alias: Irrigation - Tabs umschalten
    icon: mdi:tab
    fields:
      entity_id:
        description: "Zu aktivierender View-Boolean"
        example: "input_boolean.irrigation_view_cycle1"
    sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: >
            {% set ns = namespace(list=[]) %}
            {% for b in states['input_boolean']
              if b.object_id.startswith('irrigation_view_') and b.entity_id != entity_id %}
              {% set ns.list = ns.list + [b.entity_id] %}
            {% endfor %}
            {{ ns.list | join(',') }}
      - action: input_boolean.turn_on
        target:
          entity_id: "{{ entity_id }}"
