# Automations and scripts for covers

template:
  - cover:
      - name: Markise (inverted)
        unique_id: markise_inverted
        device_class: awning
        default_entity_id: cover.markise_inverted
        open_cover:
          - action: cover.open_cover
            target:
              entity_id:
                - cover.markise
        close_cover:
          - action: cover.close_cover
            target:
              entity_id:
                - cover.markise
        stop_cover:
          - action: cover.stop_cover
            target:
              entity_id:
                - cover.markise
        set_cover_position:
          - action: cover.set_cover_position
            target:
              entity_id:
                - cover.markise
            data:
              position: "{{ 100 - position }}"
        state: >
          {% if is_state('cover.markise', 'closed') %}
            open
          {% elif is_state('cover.markise', 'open') %}
            closed
          {% else %}
            open
          {% endif %}
        position: "{{ 100 - state_attr('cover.markise', 'current_position') | int(0) }}"

# Cover #############################################################
cover:
  - platform: group
    unique_id: rolladen
    name: rolladen
    entities:
      - cover.rollade_1
      - cover.rollade_2
      - cover.rollade_3
      - cover.rollade_4

# Input Text ########################################################
input_text:
  rolladen_last_action:
    name: Rolladen - Last action
    initial: opening
    icon: mdi:window-shutter-open
  rollade_1_last_action:
    name: Rolladen 1 - Last action
    initial: opening
    icon: mdi:window-shutter-open
  rollade_2_last_action:
    name: Rolladen 2 - Last action
    initial: opening
    icon: mdi:window-shutter-open
  rollade_3_last_action:
    name: Rolladen 3 - Last action
    initial: opening
    icon: mdi:window-shutter-open
  rollade_4_last_action:
    name: Rolladen 4 - Last action
    initial: opening
    icon: mdi:window-shutter-open

  terrasse_last_action:
    name: Markise - Last action
    initial: opening
    icon: mdi:storefront-outline
  markise_last_action:
    name: Markise - Last action
    initial: opening
    icon: mdi:storefront-outline
  seitenmarkise_last_action:
    name: Seitenmarkise - Last action
    initial: opening
    icon: mdi:storefront-outline
  markise_links_last_action:
    name: Markise - Last action
    initial: opening
    icon: mdi:storefront-outline
  markise_rechts_last_action:
    name: Markise - Last action
    initial: opening
    icon: mdi:storefront-outline

# Automation ########################################################
automation:
  # Rolladen group last action
  - id: set_rolladen_last_action
    alias: Rolladen - Set last action
    mode: parallel
    triggers:
      - trigger: state
        entity_id:
          - cover.rolladen
          - cover.rollade_4
          - cover.rollade_3
          - cover.rollade_1
          - cover.rollade_2
          - cover.terrasse
          - cover.markise
          - cover.seitenmarkise
          - cover.markise_links
          - cover.markise_rechts

    conditions:
      - condition: or
        conditions:
          - "{{ trigger.from_state.state == 'opening' }}"
          - "{{ trigger.from_state.state == 'closing' }}"

    actions:
      - action: input_text.set_value
        target:
          entity_id: input_text.{{ trigger.to_state.object_id }}_last_action
        data:
          value: "{{ trigger.from_state.state }}"

# Scripts ###########################################################
script:
  #######################################
  # Script to control covers with one button.
  # Open -> Stop -> Close -> Stop -> Open
  # Parameters:
  #   entity_id: full cover entity ID (with 'cover.' prefix)
  #######################################
  cover_one_button:
    alias: Cover - One button control
    mode: parallel
    fields:
      entity_id:
        description: Full cover entity ID with 'cover.' prefix
        example: "cover.rolladen"
    sequence:
      - variables:
          input_text_entity: >
            input_text.{{ entity_id.replace('cover.', '') }}_last_action
      - action: >
          {% set cover_state = states(entity_id) %}
          {% if cover_state in ['opening', 'closing'] %}
            cover.stop_cover
          {% elif is_state(input_text_entity, 'closing')  %}
            cover.open_cover
          {% elif is_state(input_text_entity, 'opening')  %}
            cover.close_cover
          {% else %}
            cover.stop_cover
          {% endif %}
        target:
          entity_id: "{{ entity_id }}"

  #######################################
  # Script to control covers with two buttons.
  # If cover is moving, stop it. Otherwise execute the requested action.
  # Parameters:
  #   entity_id: full cover entity ID (with 'cover.' prefix)
  #   mode: 'open' or 'close'
  #######################################
  cover_start_stop:
    alias: Cover - Two buttons control
    mode: parallel
    fields:
      entity_id:
        description: Full cover entity ID with 'cover.' prefix
        example: "cover.rolladen"
      mode:
        description: Action to perform
        example: "open"
        selector:
          select:
            options:
              - "open"
              - "close"
    sequence:
      - action: >
          {% if states(entity_id) in ['opening', 'closing'] %}
            cover.stop_cover
          {% elif mode == 'open' %}
            cover.open_cover
          {% elif mode == 'close' %}
            cover.close_cover
          {% else %}
            cover.stop_cover
          {% endif %}
        target:
          entity_id: "{{ entity_id }}"

  #######################################
  # Bulk cover control script
  # Parameters:
  #   covers: list of full cover entity IDs
  #   action: 'open', 'close', or 'stop'
  #######################################
  # covers_bulk_control:
  #   alias: Covers - Bulk Control
  #   mode: parallel
  #   fields:
  #     covers:
  #       description: List of cover entities with full entity IDs
  #       example: "cover.rolladen, cover.markise"
  #     action:
  #       description: Action to perform
  #       example: "open"
  #       selector:
  #         select:
  #           options:
  #             - "open"
  #             - "close"
  #             - "stop"
  #   sequence:
  #     - repeat:
  #         for_each: "{{ covers }}"
  #         sequence:
  #           - action: >
  #               {% if action == 'open' %}
  #                 cover.open_cover
  #               {% elif action == 'close' %}
  #                 cover.close_cover
  #               {% else %}
  #                 cover.stop_cover
  #               {% endif %}
  #             target:
  #               entity_id: "{{ repeat.item }}"

# Customize #########################################################
homeassistant:
  customize:
    cover.rolladen:
      friendly_name: Rolladen
